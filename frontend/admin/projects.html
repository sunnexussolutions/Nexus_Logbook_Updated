<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Console | Project Sandbox</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>

    /* ================================================================
       ADMIN DASHBOARD — ULTRA PROFESSIONAL LIGHT THEME
       Glassmorphism | Animated Gradients | 3D Hover | Micro-Interactions
       ================================================================ */

    :root {
      /* Core Palette matching Lead/Member UI */
      --bg-app: #f1f5f9;
      --bg-panel: #ffffff;
      --bg-subtle: #f8fafc;
      --bg-glass: rgba(255, 255, 255, 0.72);
      --bg-glass-strong: rgba(255, 255, 255, 0.88);

      /* Navigation Glassmorphism */
      --nav-bg: rgba(255, 255, 255, 0.85);

      /* Text */
      --text-main: #0f172a;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --text-light: #94a3b8;

      /* Borders */
      --border-color: #e2e8f0;
      --border-light: #f1f5f9;

      /* Accents */
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-soft: #e0e7ff;
      --primary-glow: rgba(79, 70, 229, 0.25);

      --danger: #e11d48;
      --danger-soft: rgba(225, 29, 72, 0.08);
      --success: #10b981;
      --success-soft: rgba(16, 185, 129, 0.08);
      --warning: #f59e0b;
      --warning-soft: rgba(245, 158, 11, 0.08);
      --info: #0ea5e9;
      --info-soft: rgba(14, 165, 233, 0.08);

      /* Shadows */
      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.03);
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --shadow-xl: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
      --shadow-glow: 0 0 20px rgba(79, 70, 229, 0.15);
      --shadow-card-hover: 0 20px 40px -12px rgba(79, 70, 229, 0.15), 0 8px 16px -8px rgba(0, 0, 0, 0.06);

      /* Geometry */
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-pill: 999px;

      /* Typography */
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

      /* Motion */
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --duration-fast: 0.2s;
      --duration-normal: 0.35s;
      --duration-slow: 0.5s;
    }

    /* ===================== ANIMATIONS ===================== */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(10px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    @keyframes pulse-soft {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    @keyframes gradient-shift {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes countUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===================== GLOBAL ===================== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      background: var(--bg-app);
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(99, 102, 241, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(16, 185, 129, 0.03) 0%, transparent 60%);
      background-attachment: fixed;
      font-family: var(--font-family);
      color: var(--text-main);
      font-size: 14px;
      margin: 0;
      padding-top: 64px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }

    ::selection {
      background: rgba(99, 102, 241, 0.15);
      color: var(--primary);
    }

    /* ===================== TOPNAV ===================== */
    .topnav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: var(--nav-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      z-index: 1030;
      box-shadow: 0 1px 0 var(--border-color), 0 4px 20px rgba(0, 0, 0, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    }

    .topnav-brand {
      color: var(--primary);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topnav-brand i {
      font-size: 22px;
      background: linear-gradient(135deg, var(--primary), var(--info));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .topnav-tools {
      display: flex;
      align-items: center;
      gap: 24px;
      color: var(--text-main);
    }

    .geo-switch {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      background: rgba(0, 0, 0, 0.03);
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border-color);
      transition: all var(--duration-fast) var(--ease-out);
    }

    .geo-switch:hover {
      background: rgba(0, 0, 0, 0.06);
      border-color: #cbd5e1;
    }

    .geo-switch .form-check-input {
      cursor: pointer;
      width: 2.4em;
      height: 1.2em;
    }

    .geo-switch .form-check-input:checked {
      background-color: var(--success);
      border-color: var(--success);
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.3);
    }

    /* ===================== SUBNAV ===================== */
    .subnav {
      background: var(--bg-glass-strong);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border-color);
      padding: 0 32px;
      display: flex;
      gap: 2px;
      box-shadow: var(--shadow-xs);
      position: sticky;
      top: 64px;
      z-index: 1020;
    }

    .subnav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 13.5px;
      padding: 14px 20px;
      border-bottom: 2.5px solid transparent;
      transition: all var(--duration-fast) var(--ease-out);
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      position: relative;
    }

    .subnav a:hover {
      color: var(--text-main);
      background: var(--primary-soft);
    }

    .subnav a.active {
      color: var(--primary);
      font-weight: 600;
      background: var(--primary-soft);
      border-bottom-color: var(--primary);
    }

    .subnav a.active::before {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 20%;
      right: 20%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      border-radius: 3px 3px 0 0;
    }

    /* ===================== LAYOUT ===================== */
    .container-app {
      padding: 32px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ===================== METRIC CARDS ===================== */
    .metric-group {
      display: flex;
      gap: 20px;
      margin-bottom: 32px;
    }

    .metric-card {
      flex: 1;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 22px 26px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: var(--shadow-sm);
      transition: all var(--duration-normal) var(--ease-spring);
      position: relative;
      overflow: hidden;
      cursor: default;
      animation: fadeInScale var(--duration-slow) var(--ease-out) both;
    }

    .metric-card:nth-child(1) {
      animation-delay: 0.05s;
    }

    .metric-card:nth-child(2) {
      animation-delay: 0.12s;
    }

    .metric-card:nth-child(3) {
      animation-delay: 0.19s;
    }

    .metric-card:nth-child(4) {
      animation-delay: 0.26s;
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), #8b5cf6, #ec4899);
      background-size: 200% 100%;
      animation: gradient-shift 4s ease infinite;
      opacity: 0;
      transition: opacity var(--duration-fast);
    }

    .metric-card::after {
      content: '';
      position: absolute;
      top: -30px;
      right: -30px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-soft), transparent);
      opacity: 0;
      transition: all var(--duration-normal) var(--ease-out);
    }

    .metric-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: var(--shadow-card-hover);
      border-color: rgba(99, 102, 241, 0.2);
    }

    .metric-card:hover::before {
      opacity: 1;
    }

    .metric-card:hover::after {
      opacity: 1;
      top: -15px;
      right: -15px;
    }

    .metric-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
      letter-spacing: 0.8px;
    }

    .metric-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--text-main);
      line-height: 1;
      letter-spacing: -1px;
      animation: countUp var(--duration-slow) var(--ease-out) both;
    }

    /* ===================== PANELS ===================== */
    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: all var(--duration-normal) var(--ease-out);
      animation: fadeInUp var(--duration-slow) var(--ease-out) both;
    }

    .panel:hover {
      box-shadow: var(--shadow-lg);
      border-color: rgba(99, 102, 241, 0.12);
    }

    .panel-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(180deg, var(--bg-subtle) 0%, var(--bg-panel) 100%);
    }

    .panel-title {
      font-size: 14.5px;
      font-weight: 700;
      margin: 0;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.2px;
    }

    .panel-title i {
      font-size: 17px;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .panel-body {
      padding: 24px;
      flex-grow: 1;
    }

    .panel-body-flush {
      padding: 0;
    }

    /* ===================== TABLES ===================== */
    .table-responsive {
      overflow-x: auto;
    }

    .table-enterprise {
      width: 100%;
      margin: 0;
      border-collapse: collapse;
    }

    .table-enterprise th {
      background: linear-gradient(180deg, var(--bg-subtle), #f1f5f9);
      color: var(--text-muted);
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 14px 18px;
      border-bottom: 2px solid var(--border-color);
      text-align: left;
      letter-spacing: 0.8px;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .table-enterprise td {
      padding: 13px 18px;
      border-bottom: 1px solid var(--border-light);
      vertical-align: middle;
      color: var(--text-main);
      font-size: 13px;
      transition: all 0.15s ease;
    }

    .table-enterprise tbody tr {
      transition: all var(--duration-fast) ease;
    }

    .table-enterprise tbody tr:hover {
      background: var(--primary-soft);
    }

    .table-enterprise tbody tr:hover td:first-child {
      padding-left: 22px;
    }

    .table-enterprise tbody tr:last-child td {
      border-bottom: none;
    }

    /* ===================== FORMS ===================== */
    .form-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-control,
    .form-select {
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border-color);
      padding: 9px 14px;
      font-size: 14px;
      transition: all var(--duration-fast) var(--ease-out);
      background-color: var(--bg-subtle);
      color: var(--text-main);
    }

    .form-control:focus,
    .form-select:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 4px var(--primary-glow);
      outline: none;
      transform: translateY(-1px);
    }

    .form-control::placeholder {
      color: var(--text-light);
      font-weight: 400;
    }

    textarea.form-control {
      resize: vertical;
    }

    /* ===================== BUTTONS ===================== */
    .btn-sys {
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 13px;
      padding: 9px 20px;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      letter-spacing: 0.1px;
      transition: all var(--duration-fast) var(--ease-out);
      position: relative;
      overflow: hidden;
    }

    .btn-sys::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent);
      opacity: 0;
      transition: opacity var(--duration-fast);
    }

    .btn-sys:hover::after {
      opacity: 1;
    }

    .btn-sys:active {
      transform: scale(0.96);
    }

    .btn-sys-primary {
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      color: white;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
    }

    .btn-sys-primary:hover {
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
      transform: translateY(-2px);
    }

    .btn-sys-default {
      background: var(--bg-subtle);
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }

    .btn-sys-default:hover {
      background: #fff;
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .status-tag {
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    /* ===================== BADGES ===================== */
    .badge {
      font-weight: 600;
      font-size: 11px;
      padding: 5px 12px;
      border-radius: var(--radius-pill);
      letter-spacing: 0.3px;
      box-shadow: var(--shadow-xs);
      transition: all var(--duration-fast);
    }

    .badge:hover {
      transform: scale(1.05);
    }

    .badge.bg-success {
      background: var(--success) !important;
      box-shadow: 0 2px 8px rgba(16, 185, 129, 0.25);
    }

    .badge.bg-danger {
      background: var(--danger) !important;
      box-shadow: 0 2px 8px rgba(239, 68, 68, 0.25);
    }

    .badge.bg-warning {
      background: var(--warning) !important;
      box-shadow: 0 2px 8px rgba(245, 158, 11, 0.25);
    }

    .badge.bg-info {
      background: var(--info) !important;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.25);
    }

    .badge.bg-secondary {
      background: var(--text-muted) !important;
    }

    /* ===================== TABS ===================== */
    .nav-tabs {
      border-bottom: none !important;
      gap: 4px;
    }

    .nav-tabs .nav-link {
      border: none !important;
      color: var(--text-secondary) !important;
      font-weight: 500 !important;
      font-size: 13px !important;
      padding: 12px 20px !important;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0 !important;
      transition: all var(--duration-fast) var(--ease-out);
      position: relative;
      background: transparent !important;
    }

    .nav-tabs .nav-link:hover {
      background: var(--primary-soft) !important;
      color: var(--text-main) !important;
      transform: translateY(-1px);
    }

    .nav-tabs .nav-link.active {
      color: var(--primary) !important;
      font-weight: 700 !important;
      background: var(--primary-soft) !important;
    }

    .nav-tabs .nav-link.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 15%;
      right: 15%;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), #8b5cf6);
      border-radius: 3px 3px 0 0;
      box-shadow: 0 -2px 8px rgba(99, 102, 241, 0.3);
    }

    .tab-content {
      animation: slideDown 0.3s var(--ease-out);
    }

    /* ===================== PROGRESS ===================== */
    .progress {
      background: var(--border-light);
      border-radius: var(--radius-pill);
      overflow: hidden;
      height: 8px;
    }

    .progress-bar {
      border-radius: var(--radius-pill);
      background: linear-gradient(90deg, var(--primary), #8b5cf6, var(--success));
      background-size: 200% 100%;
      animation: gradient-shift 3s ease infinite;
      transition: width 0.8s var(--ease-out);
      box-shadow: 0 0 8px rgba(99, 102, 241, 0.3);
    }

    /* ===================== ALERTS ===================== */
    .alert {
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      border: none;
      animation: slideDown 0.3s var(--ease-out);
    }

    .alert-success {
      background: var(--success-soft);
      color: #065f46;
      border-left: 4px solid var(--success);
      box-shadow: 0 2px 12px rgba(16, 185, 129, 0.1);
    }

    .alert-danger {
      background: var(--danger-soft);
      color: #991b1b;
      border-left: 4px solid var(--danger);
      box-shadow: 0 2px 12px rgba(239, 68, 68, 0.1);
    }

    .alert-warning {
      background: var(--warning-soft);
      color: #92400e;
      border-left: 4px solid var(--warning);
      box-shadow: 0 2px 12px rgba(245, 158, 11, 0.1);
    }

    /* ===================== LIST GROUPS ===================== */
    .list-group-item,
    .list-group-flush .list-group-item {
      border-color: var(--border-light);
      padding: 11px 16px;
      font-size: 13px;
      transition: all var(--duration-fast) var(--ease-out);
    }

    .list-group-item:hover {
      background: var(--primary-soft);
      padding-left: 20px;
    }

    /* ===================== MODALS ===================== */
    .modal-content {
      border: none;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      overflow: hidden;
    }

    .modal-header {
      background: linear-gradient(180deg, var(--bg-subtle), var(--bg-panel));
      border-bottom: 1px solid var(--border-color);
      padding: 18px 28px;
    }

    .modal-title {
      font-weight: 700;
      font-size: 17px;
      color: var(--text-main);
    }

    .modal-body {
      padding: 28px;
    }

    .modal-footer {
      border-top: 1px solid var(--border-color);
      padding: 16px 28px;
      background: var(--bg-subtle);
    }

    /* ===================== SCROLLBAR ===================== */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #c7d2fe, #a5b4fc);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary);
    }

    /* ===================== GRIDS ===================== */
    .grid-2-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .grid-3-col {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
    }

    .grid-sidebar-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 28px;
    }

    /* Provisioning cards */
    .grid-3-col>.bg-white {
      border-radius: var(--radius-lg) !important;
      border: 1px solid var(--border-color) !important;
      box-shadow: var(--shadow-sm) !important;
      transition: all var(--duration-normal) var(--ease-spring);
      position: relative;
      overflow: hidden;
    }

    .grid-3-col>.bg-white::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), #8b5cf6);
      opacity: 0;
      transition: opacity var(--duration-fast);
    }

    .grid-3-col>.bg-white:hover {
      box-shadow: var(--shadow-card-hover) !important;
      transform: translateY(-4px);
