<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome | SUN Nexus</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    :root {
      /* Modern Color Palette */
      --primary: #6366f1;
      /* Indigo */
      --primary-dark: #4f46e5;
      --primary-light: #e0e7ff;
      --accent: #f59e0b;
      /* Amber */

      --text-dark: #0f172a;
      --text-muted: #64748b;
      --bg-light: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;

      --font-display: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-light);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
    }

    /* --- LAYOUT --- */
    .split-container {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* --- LEFT: VISUAL/BRANDING --- */
    .hero-section {
      flex: 1.2;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem;
      color: white;
    }

    /* Decorative Background Elements */
    .hero-section::before {
      content: '';
      position: absolute;
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 1;
    }

    .hero-section::after {
      content: '';
      position: absolute;
      bottom: -20%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 560px;
    }

    .brand-logo {
      width: 180px;
      margin-bottom: 2rem;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease;
    }

    .brand-logo:hover {
      transform: translateY(-2px);
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: 4rem;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-subtitle {
      font-size: 1.25rem;
      line-height: 1.6;
      color: #94a3b8;
      font-weight: 400;
    }

    /* --- RIGHT: FORM SECTION --- */
    .form-section {
      flex: 1;
      background-color: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }

    .form-wrapper {
      width: 100%;
      max-width: 420px;
    }

    .form-header {
      margin-bottom: 2.5rem;
    }

    .form-header h2 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
    }

    .form-header p {
      color: var(--text-muted);
      font-size: 1rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
    }

    .form-control {
      width: 100%;
      padding: 0.875rem 1rem;
      font-size: 1rem;
      font-family: var(--font-body);
      color: var(--text-dark);
      background-color: var(--bg-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: all 0.2s ease;
    }

    .form-control::placeholder {
      color: #94a3b8;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      background-color: var(--surface);
      box-shadow: 0 0 0 4px var(--primary-light);
    }

    .btn-login {
      width: 100%;
      padding: 0.875rem;
      background-color: var(--primary);
      color: white;
      font-family: var(--font-display);
      font-size: 1.125rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 1rem;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-login:hover {
      background-color: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    #error {
      min-height: 24px;
      font-size: 0.875rem;
      border-radius: 6px;
      padding: 0.5rem;
    }

    /* Floating badges for tech vibe */
    .tech-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      font-size: 0.875rem;
      font-weight: 500;
      margin-right: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .badges-container {
      margin-top: 3rem;
    }

    /* Animations */
    .fade-in {
      animation: fadeIn 0.8s ease-out forwards;
      opacity: 0;
    }

    .slide-up {
      animation: slideUp 0.6s ease-out forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    .delay-1 {
      animation-delay: 0.1s;
    }

    .delay-2 {
      animation-delay: 0.2s;
    }

    .delay-3 {
      animation-delay: 0.3s;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 992px) {
      .split-container {
        flex-direction: column;
      }

      .hero-section {
        flex: none;
        padding: 3rem 2rem 2rem;
        align-items: center;
        text-align: center;
      }

      .brand-logo {
        width: 140px;
        margin-bottom: 1.5rem;
      }

      .hero-title {
        font-size: 2.25rem;
        margin-bottom: 1rem;
      }

      .hero-subtitle {
        font-size: 1.1rem;
      }

      .badges-container {
        display: none;
      }

      .form-section {
        padding: 2rem;
      }
    }

    @media (max-width: 576px) {
      .hero-section {
        padding: 2.5rem 1.5rem 1.5rem;
      }

      .brand-logo {
        width: 120px;
        margin-bottom: 1rem;
      }

      .hero-title {
        font-size: 2rem;
        margin-bottom: 0.5rem;
      }

      .hero-title br {
        display: none;
        /* Make title inline on very small screens */
      }

      .hero-subtitle {
        display: none;
        /* Hide subtitle on very small screens to keep form high */
      }

      .form-section {
        padding: 1rem;
      }

      .form-header h2 {
        font-size: 1.75rem;
      }
    }
  </style>
</head>

<body>

  <div class="split-container">
    <!-- Branding Side -->
    <div class="hero-section">
      <div class="hero-content">
        <img src="WhatsApp Image 2026-02-25 at 3.37.21 PM.jpeg" alt="SUN Nexus" class="brand-logo fade-in">

        <h1 class="hero-title fade-in delay-1">Innovate.<br>Build.<br>Succeed.</h1>
        <p class="hero-subtitle fade-in delay-2">
          Enter the SUN Nexus central hub. Access your project repositories, manage team resources, and track your
          operational telemetry all in one place.
        </p>

        <div class="badges-container fade-in delay-3">
          <div class="tech-badge"><i class="bi bi-code-slash text-info"></i> Software Dev</div>
          <div class="tech-badge"><i class="bi bi-cpu text-warning"></i> AI & Hardware</div>
          <div class="tech-badge"><i class="bi bi-rocket text-danger"></i> Innovation</div>
        </div>
      </div>
    </div>

    <!-- Login Form Side -->
    <div class="form-section">
      <div class="form-wrapper">
        <div class="form-header slide-up">
          <h2>Welcome Back</h2>
          <p>Please enter your credentials to connect.</p>
        </div>

        <div class="form-group slide-up delay-1">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="name@sunnexus.com" autocomplete="email" />
        </div>

        <div class="form-group slide-up delay-2">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label class="form-label mb-0" for="password">Password</label>
          </div>
          <input type="password" id="password" class="form-control" placeholder="••••••••" />
        </div>

        <button class="btn-login slide-up delay-3" onclick="login()">
          Sign In <i class="bi bi-arrow-right"></i>
        </button>

        <div id="error" class="text-danger mt-3 text-center fw-semibold slide-up delay-3"></div>
      </div>
    </div>
  </div>

  <script src="js/ui-dialogs.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
